<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>퍼가요~♡ ㅁiU월드</title>
    <style>
        /* 1. 전체 배경 (회색 바둑판) */
        body {
            background-color: #a3a3a3;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; font-family: "돋움", dotum, sans-serif;
        }

        /* 2. 가장 바깥쪽 하늘색 틀 */
        .outer-box {
            width: 800px; height: 520px;
            background-color: #b3d9ff;
            border: 1px solid #777; border-radius: 15px;
            padding: 20px; display: flex; position: relative;
        }

        /* 3. 내부 흰색 점선 틀 */
        .inner-box {
            background-color: white; border: 2px dashed #999; border-radius: 10px;
            flex: 1; display: flex; padding: 15px; gap: 10px;
        }

        /* --- 왼쪽 프로필 섹션 --- */
        .left-section { width: 180px; display: flex; flex-direction: column; flex-shrink: 0; }
        .visitor-count { font-size: 10px; text-align: center; margin-bottom: 10px; }
        .visitor-count b { color: red; }

        .profile-container {
            border: 1px solid #ccc; width: 100%; height: 160px;
            background-color: #f0f0f0; margin-bottom: 15px; overflow: hidden;
        }
        .profile-container img { width: 100%; height: 100%; object-fit: cover; }

        .profile-text { font-size: 11px; color: #666; line-height: 1.6; text-align: center; }
        .profile-name { color: #238db3; font-weight: bold; margin: 10px 0; text-align: center; }

        /* --- 오른쪽 메인 섹션 --- */
        .main-section { flex: 1; display: flex; flex-direction: column; }
        .main-title { 
            font-size: 13px; color: #238db3; font-weight: bold; 
            margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px;
        }

        .miniroom-area {
            width: 100%; height: 220px; border: 1px solid #ddd;
            background: #f9f9f9; margin-bottom: 15px;
            /* 여기에 아까 만든 미니룸 이미지를 넣으세요 */
            background-image: url('미니룸_이미지_주소');
            background-size: cover; background-position: center;
        }

        .news-section { font-size: 11px; color: #333; }
        .news-title { font-weight: bold; color: #238db3; margin-bottom: 5px; display: block; }

        /* 사진첩 스타일 */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .photo-item { border: 1px solid #ddd; padding: 5px; text-align: center; background: #fff; }
        .photo-item img { width: 100%; height: 120px; object-fit: cover; }

        /* 사이드 메뉴 */
        .side-menu { position: absolute; right: -55px; top: 60px; display: flex; flex-direction: column; gap: 4px; }
        .menu-btn {
            background-color: #238db3; color: white; border: 1px solid #1a6d8a;
            padding: 10px 10px; border-radius: 0 8px 8px 0; cursor: pointer; width: 60px; text-align: left;
        }
        .menu-btn.active { background-color: white; color: #333; border-left: none; font-weight: bold; }

        /* 기타 스타일 */
        .title { color: #238db3; font-weight: bold; margin-bottom: 15px; display: block; }
        .input-group { display: flex; gap: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="outer-box">
    <div class="inner-box">
        <div class="left-section">
            <div class="visitor-count">TODAY <b>609</b> | TOTAL 2008</div>
            <div class="profile-container">
                <img src="https://raw.githubusercontent.com/da1eee0609/meu2026/main/0325.gif" alt="Profile">
            </div>
            <div class="profile-name">채오니</div>
            <div class="profile-text">
                어제보다 오늘 더<br>사랑해! 퍼가요~♡
            </div>
        </div>

        <div class="main-section">
            <div class="main-title">♡미유밖에 모르는 바부~♡ <span style="font-weight:normal; font-size:10px; color:#999; margin-left:10px;">http://www.cyworld.com/...</span></div>
            
            <div class="miniroom-area"></div>
            
            <div class="news-section">
                <span class="news-title">Updated news</span>
                <p>● [공지] 생일 카페 이벤트 안내</p>
                <p>● [사진] 이번 앨범 컨셉 미쳤다ㅠㅠ</p>
                <p>● [일기] 벌써 생일이라니 시간 빠르다</p>
            </div>
        </div>
    </div>
    <div id="photo" class="content-area">
                <b>Photo Album</b><hr>
                <div class="photo-grid">
                    <div class="photo-item"><img src="이미지주소1"><span>입덕부정기</span></div>
                    <div class="photo-item"><img src="이미지주소2"><span>레전드 무대</span></div>
                    <div class="photo-item"><img src="이미지주소3"><span>오늘의 픽셀</span></div>
                </div>
            </div>

            <div id="guest" class="content-area">
                <b>Guestbook</b><hr>
                <div class="input-group">
                    <input type="text" placeholder="축하 메시지 남기기" style="flex:1;">
                    <button style="font-size:11px;">확인</button>
                </div>
                <div style="border-bottom:1px dashed #ddd; padding:5px;"><b>팬1</b>: 도토리 10개 선물하고 가요!</div>
                <div style="border-bottom:1px dashed #ddd; padding:5px;"><b>팬2</b>: 사이트 너무 예뻐요ㅠㅠ</div>
            </div>
        </div>
    </div>

    <div class="side-menu">
        <button class="menu-btn active" onclick="openTab(event, 'home')">홈</button>
        <button class="menu-btn" onclick="openTab(event, 'photo')">사진첩</button>
        <button class="menu-btn" onclick="openTab(event, 'guest')">방명록</button>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        var i, content, tablinks;
        content = document.getElementsByClassName("content-area");
        for (i = 0; i < content.length; i++) {
            content[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("menu-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>
    
</body>
</html>
