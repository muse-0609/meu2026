<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ㅁiU월드</title>
    <style>
        body {
            background-color: #a3a3a3;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; font-family: "돋움", dotum, sans-serif;
        }

        .outer-box {
            width: 950px; height: 560px;
            background-color: #b3d9ff;
            border: 1px solid #777; border-radius: 15px;
            padding: 20px 40px 20px 20px;
            display: flex; position: relative; gap: 10px;
        }

        .inner-box {
            background-color: white; border: 2px dashed #999; border-radius: 10px;
            flex: 1; display: flex; padding: 15px; gap: 15px;
        }

        /* 왼쪽 섹션 */
        .left-section { width: 170px; display: flex; flex-direction: column; flex-shrink: 0; }
        .visitor-count { font-size: 10px; text-align: center; margin-bottom: 10px; }
        .visitor-count b { color: red; }
        .profile-img { border: 1px solid #ccc; width: 100%; height: 150px; background: #eee; margin-bottom: 10px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { color: #238db3; font-weight: bold; margin-bottom: 10px; text-align: center; }

        /* 중앙 섹션 */
        .main-section { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding-right: 5px; }
        .main-title { font-size: 13px; color: #238db3; font-weight: bold; margin-bottom: 10px; }
        .miniroom-area { width: 100%; height: 200px; border: 1px solid #ddd; background: #f9f9f9; margin-bottom: 15px; }
        
        /* 일촌평 영역 */
        .guest-say { font-size: 11px; margin-top: 10px; }
        .guest-say-title { color: #238db3; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }
        .input-box { background: #f4f4f4; padding: 8px; display: flex; gap: 5px; margin-bottom: 10px; }
        .input-box input { flex: 1; border: 1px solid #ccc; font-size: 11px; padding: 3px; }
        .input-box button { cursor: pointer; font-size: 10px; background: #fff; border: 1px solid #999; }
        
        /* 일촌평 목록 스타일 */
        #comment-list { max-height: 120px; overflow-y: auto; }
        .comment-item { border-bottom: 1px dashed #eee; padding: 5px 0; line-height: 1.4; }
        .comment-item b { color: #238db3; }

        /* 오른쪽 사이드바 */
        .right-sidebar { width: 160px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .sidebar-box { background: #e9e9e9; border: 1px solid #ccc; padding: 10px; font-size: 11px; }
        .sidebar-title { font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 5px; padding-bottom: 3px; }
        .music-list { list-style: none; padding: 0; margin: 0; color: #555; }
        .music-list li { margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 메뉴 탭 */
        .side-tabs {
            position: absolute; right: -5px; top: 60px;
            display: flex; flex-direction: column; gap: 3px;
        }
        .tab {
            width: 45px; padding: 10px 5px; background-color: #238db3; color: white;
            border: 1px solid #1a6d8a; border-radius: 0 5px 5px 0;
            font-size: 11px; cursor: pointer; text-align: center; writing-mode: vertical-lr;
        }
        .tab.active { background-color: white; color: black; border-left: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="outer-box">
    <div class="inner-box">
        <div class="left-section">
            <div class="visitor-count">TODAY <b>520</b> | TOTAL 1994</div>
            <div class="profile-img">
                <img src="https://via.placeholder.com/150" alt="Profile">
            </div>
            <div class="profile-name">미유바라기</div>
            <div style="font-size:11px; color:#666; text-align:center;">
                TODAY IS... <span style="color:red;">설렘♥</span>
            </div>
        </div>

        <div class="main-section">
            <div class="main-title">우리 애 생일카페에 오신 걸 환영합니다!</div>
            <div class="miniroom-area">
                </div>
            
            <div class="guest-say">
                <div class="guest-say-title">What friends say</div>
                <div class="input-box">
                    <input type="text" id="comment-input" placeholder="일촌평을 남겨주세요!">
                    <button onclick="addComment()">확인</button>
                </div>
                <div id="comment-list">
                    <div class="comment-item"><b>행복팬</b> 우리 미유 생일 너무 축하해! 퍼가요~♡</div>
                    <div class="comment-item"><b>도토리부자</b> 미니홈피 진짜 예쁘네요. 생카 꼭 갈게요!</div>
                </div>
            </div>
        </div>

        <div class="right-sidebar">
            <div class="sidebar-box">
                <div class="sidebar-title">싸이 BGM</div>
                <ul class="music-list">
                    <li style="color:#ff8a00">▶ 너의 곁으로 - 유주</li>
                    <li>2. 잘가요 - 조성모</li>
                    <li>3. 벌써 일년 - 브라운아이즈</li>
                </ul>
            </div>
            <div class="sidebar-box">
                <div class="sidebar-title">마이심볼</div>
                <div style="text-align:center; padding:10px;">☀️ ☁️ ☂️ ⚡</div>
            </div>
        </div>
    </div>

    <div class="side-tabs">
        <div class="tab active">홈</div>
        <div class="tab">프로필</div>
        <div class="tab">사진첩</div>
        <div class="tab">방명록</div>
    </div>
</div>

<script>
    function addComment() {
        const input = document.getElementById('comment-input');
        const list = document.getElementById('comment-list');
        
        if (input.value.trim() === "") {
            alert("일촌평을 입력해주세요!");
            return;
        }

        // 1. 새로운 댓글 요소 만들기
        const newComment = document.createElement('div');
        newComment.className = 'comment-item';
        
        // 2. 현재 시간을 간단히 넣거나, 닉네임을 임의로 지정 (생카 방문객 느낌)
        newComment.innerHTML = `<b>익명팬</b> ${input.value}`;

        // 3. 목록의 맨 위에 추가하기
        list.insertBefore(newComment, list.firstChild);

        // 4. 입력창 비우기
        input.value = "";
    }

    // 엔터키를 눌러도 등록되게 하기
    document.getElementById('comment-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addComment();
        }
    });
</script>

</body>
</html>
